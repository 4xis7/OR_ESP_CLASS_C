<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>ESP32 CLIENT C</title>

<style>

body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
  padding-top: 50px;
}

.card {
  width: 400px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input {
  width: 280px;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

.info {
  text-align: left;
  margin-top: 20px;
  font-size: 14px;
}

</style>

</head>

<body>

<div class="card">

<h2>ESP32 CLIENT C</h2>

<div class="info">

  <p>THIS MAC:</p>
  <h3>%MY_MAC%</h3>

  <p>SERVER MAC (SAVED):</p>
  <h3>%PEER_MAC%</h3>

</div>

<form action="/save" method="POST">

  SERVER MAC:<br><br>

  <input
    type="text"
    name="mac"
    placeholder="AA:BB:CC:DD:EE:FF">

  <br><br>

  <button type="submit">SAVE</button>

</form>

<br>

<form action="/restart" method="POST">
  <button type="submit">RESTART</button>
</form>

</div>

</body>
</html>
